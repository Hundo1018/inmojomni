<svg xmlns="http://www.w3.org/2000/svg" width="880" height="392" viewBox="0 0 880 392" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace">
  <rect x="0" y="0" width="880" height="392" rx="10" fill="#0d1117" stroke="#30363d"/>

  <!-- right column -->
  <g font-size="12.5" fill="#e6edf3">
    <text x="452" y="84">  <tspan fill="#3fb950">✓</tspan> GPIO pad config (drive/schmitt)</text>
    <text x="452" y="103">  <tspan fill="#3fb950">✓</tspan> PIO state machine toggling a pin</text>
    <text x="452" y="122">  <tspan fill="#3fb950">✓</tspan> TIMER ALARM0 IRQ via NVIC (2 fires)</text>

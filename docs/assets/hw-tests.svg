    <text x="452" y="179">  <tspan fill="#3fb950">✓</tspan> PWM 12 kHz 50% (counter + pad readback)</text>
    <text x="452" y="198">  <tspan fill="#3fb950">✓</tspan> ADC temp sensor (plausible + stable)</text>
    <text x="452" y="217">  <tspan fill="#3fb950">✓</tspan> UART0 internal loopback (LBE)</text>
    <text x="452" y="236">  <tspan fill="#3fb950">✓</tspan> PIO side-set + forward label (edge count)</text>

<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57606a"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="24" y="34" font-size="16" font-weight="600" fill="#1f2328">How Mojo reaches a chip its LLVM cannot target</text>
  <text x="24" y="54" font-size="12" fill="#57606a">Mojo's bundled LLVM has no 32-bit ARM backend — so emit for a target with the identical data model, then retarget the IR.</text>

  <!-- row 1 boxes -->
  <rect x="30" y="80" width="200" height="56" rx="8" fill="#fff8f5" stroke="#F74C00" stroke-width="1.5"/>
  <text x="130" y="103" font-size="13" font-weight="600" fill="#1f2328" text-anchor="middle">main.mojo + pico SDK</text>
  <text x="130" y="121" font-size="11" fill="#57606a" text-anchor="middle">pure Mojo, no C layer</text>

  <rect x="340" y="80" width="200" height="56" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="440" y="103" font-size="13" font-weight="600" fill="#1f2328" text-anchor="middle">LLVM IR — riscv32</text>
  <text x="440" y="121" font-size="11" fill="#57606a" text-anchor="middle">same ILP32 LE data model</text>

  <rect x="650" y="80" width="200" height="56" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="750" y="103" font-size="13" font-weight="600" fill="#1f2328" text-anchor="middle">ARMv6-M IR</text>
  <text x="750" y="121" font-size="11" fill="#57606a" text-anchor="middle">thumbv6m-none-eabi</text>

  <!-- row 2 boxes -->
  <rect x="650" y="220" width="200" height="56" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="750" y="243" font-size="13" font-weight="600" fill="#1f2328" text-anchor="middle">Cortex-M0+ object</text>
  <text x="750" y="261" font-size="11" fill="#57606a" text-anchor="middle">system opt -O2 · llc -O2</text>

  <rect x="340" y="220" width="200" height="56" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="440" y="243" font-size="13" font-weight="600" fill="#1f2328" text-anchor="middle">firmware.elf</text>
  <text x="440" y="261" font-size="11" fill="#57606a" text-anchor="middle">blink: 780 B, same as clang C</text>

  <rect x="30" y="220" width="200" height="56" rx="8" fill="#f2fbf5" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="130" y="243" font-size="13" font-weight="600" fill="#1f2328" text-anchor="middle">RP2040</text>
  <text x="130" y="261" font-size="11" fill="#57606a" text-anchor="middle">26 on-target tests, all green</text>

  <!-- arrows row 1 -->
  <line x1="230" y1="108" x2="336" y2="108" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="283" y="98" font-size="10.5" fill="#57606a" text-anchor="middle">mojo build --emit=llvm</text>

  <line x1="540" y1="108" x2="646" y2="108" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="593" y="84" font-size="10.5" fill="#F74C00" text-anchor="middle" font-weight="600">tools/retarget.mojo</text>
  <text x="593" y="98" font-size="10" fill="#57606a" text-anchor="middle">triple + datalayout + syntax downgrade</text>

  <!-- vertical arrow -->
  <line x1="750" y1="136" x2="750" y2="216" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="738" y="180" font-size="10.5" fill="#57606a" text-anchor="end">verified: opt -verify · volatile ops preserved</text>

  <!-- arrows row 2 -->
  <line x1="650" y1="248" x2="544" y2="248" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="597" y="238" font-size="10.5" fill="#57606a" text-anchor="middle">arm-none-eabi-gcc link:</text>
  <text x="597" y="264" font-size="10" fill="#57606a" text-anchor="middle">crt0.S · link.ld · boot2 · libgcc</text>

  <line x1="340" y1="248" x2="234" y2="248" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="287" y="238" font-size="10.5" fill="#57606a" text-anchor="middle">probe-rs (SWD) or UF2</text>

  <text x="24" y="320" font-size="10.5" fill="#8b949e">When a Mojo nightly introduces new IR syntax, support is one rewrite rule — guarded by unit tests; a daily CI job builds against the newest nightly.</text>
</svg>

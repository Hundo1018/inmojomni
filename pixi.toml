[workspace]
authors = ["Tien Chueh Wang <f74169@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "inmojomni"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

[tasks]
# Precompile all ludens-engine packages into build/ (required before run/test).
build = "bash scripts/build_engine.sh"
# Build, then run every test file (stops at the first failure).
test = { cmd = "bash scripts/run_tests.sh", depends-on = ["build"] }
# Build, then run every example.
examples = { cmd = "bash scripts/run_examples.sh", depends-on = ["build"] }
# Build, then run every benchmark and write BENCHMARK_REPORT.md.
benchmark = { cmd = "bash scripts/run_benchmarks.sh", depends-on = ["build"] }

[dependencies]
modular = ">=26.4.0.dev2026051806,<27"
mojo = ">=1.0.0b2.dev2026051806,<2"

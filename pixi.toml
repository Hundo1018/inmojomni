[workspace]
authors = ["Tien Chueh Wang <f74169@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "inmojomni"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

# inmojomni: bare-metal RP2040 firmware and SDK written in Mojo.
# The `pico` Mojo package is installable as a dependency:
#   pixi add --git https://github.com/Hundo1018/inmojomni.git inmojomni

[package]
name = "inmojomni"
version = "0.1.0"
description = "Bare-metal RP2040 SDK written in Mojo (import as `pico`)"
license = "MIT"

[package.build]
backend = { name = "pixi-build-mojo", version = "*" }

[package.build.config.pkg]
name = "pico"
path = "src/pico"

[package.host-dependencies]
mojo-compiler = "==1.0.0b3.dev2026071006"

[package.build-dependencies]
mojo-compiler = "==1.0.0b3.dev2026071006"

[package.run-dependencies]
mojo-compiler = "==1.0.0b3.dev2026071006"

# Product tooling (build pipeline, ELF verifier, benchmark driver) is
# Mojo; Python remains only for test orchestration and the DAP client.
[tasks]
build = "mojo run -I tools tools/build.mojo"
build-debug = "mojo run -I tools tools/build.mojo --debug"
flash = "mojo run -I tools tools/build.mojo --flash"
flash-debug = "mojo run -I tools tools/build.mojo --debug --flash"
uf2 = "mojo run -I tools tools/build.mojo --uf2"
test = "python tools/run_tests.py"
test-host = "python tools/run_tests.py --no-hw"
bench = "mojo run -I tools tools/bench.mojo"
bench-rp2350 = "mojo run -I tools tools/bench_rp2350.mojo"
features-rp2350 = "mojo run -I tools tools/features_rp2350.mojo"
piomc-rp2350 = "mojo run -I tools tools/piomc_rp2350.mojo"
debug-test-rp2350 = "mojo run -I tools tools/debug_rp2350.mojo"
periph-rp2350 = "mojo run -I tools tools/periph_rp2350.mojo"
rtt-rp2350 = "mojo run -I tools tools/rtt_rp2350.mojo"
flash-rp2350 = "mojo run -I tools tools/build.mojo --chip rp2350 --name main_rp2350 --flash src/main_rp2350.mojo"
flash-debug-rp2350 = "mojo run -I tools tools/build.mojo --chip rp2350 --debug --name main_rp2350_debug --flash src/main_rp2350.mojo"
chart = "mojo run -I tools tools/chart.mojo"
sizes = "mojo run -I tools tools/sizes.mojo"
# .vscode/rp2040.svd provenance: pico-sdk (BSD-3-Clause); refresh with:
svd-update = "curl -sf https://raw.githubusercontent.com/raspberrypi/pico-sdk/2.1.0/src/rp2040/hardware_regs/RP2040.svd -o .vscode/rp2040.svd"

[dependencies]
# EXACT pin, not a lower bound, on purpose. Mojo gated riscv32/riscv64
# codegen behind a backend allowlist starting dev2026071105 (last
# working: dev2026071006; bisected 2026-07-18). The whole build rests on
# riscv32 emit, so a lower bound like ">=…071006,<2" would let the
# packaging path (pixi build / add --git, which ignore the lockfile and
# resolve the NEWEST match) grab a broken nightly. Only bump when a newer
# nightly re-enables riscv32 emit — verify with `mojo build
# --emit=object --target-triple=riscv32-unknown-none-elf` first.
modular = "==26.5.0.dev2026071006"
mojo = "==1.0.0b3.dev2026071006"
pyusb = ">=1.3.1,<2"

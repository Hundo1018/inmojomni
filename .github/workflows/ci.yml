# Host-side CI: everything that can be verified without a debug probe.
# Local equivalent:
#   sudo apt install gcc-arm-none-eabi llvm clang && pixi run test-host
name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 3 * * *"  # daily: catch breaking Mojo nightlies early
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain (arm-none-eabi-gcc, LLVM 18, clang)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi llvm clang binutils-arm-none-eabi

      - name: Set up pixi (pinned Mojo nightly toolchain)
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true

      - name: Host test suite (unit + compile-fail + build + ELF verification)
        run: pixi run test-host

      - name: Firmware size report and gate (blink .text <= 1024 B)
        run: |
          arm-none-eabi-size build/firmware.elf | tee size.txt
          {
            echo '### Firmware size'
            echo '```'
            cat size.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          text=$(awk 'NR==2{print $1}' size.txt)
          echo "blink .text = ${text} bytes"
          test "$text" -le 1024

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/firmware.elf
            build/firmware.map
            build/firmware-debug.elf

  # The project tracks Mojo nightly: this job ignores the lockfile and
  # tests against the newest toolchain every day, so a breaking nightly
  # (usually just a new IR construct for tools/retarget.mojo) surfaces
  # here instead of on a developer's machine.
  nightly-latest:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install cross toolchain (arm-none-eabi-gcc, LLVM 18, clang)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi llvm clang binutils-arm-none-eabi
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: false
      - name: Update to the newest Mojo nightly
        run: pixi update
      - name: Host test suite on latest nightly
        run: pixi run test-host
